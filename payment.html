<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopWave | Payment</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#gradient-logo)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="gradient-logo" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#ec4899" />
          </linearGradient>
        </defs>
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      ShopWave
    </div>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="payment-page">
    <h1 class="section-title">Complete Your Payment</h1>
    <div class="payment-grid">
      <div class="payment-card">
        <h2>Payment details</h2>
        <form id="paymentForm" class="payment-form">
          <div class="field-group">
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="John Doe" required>
          </div>
          <div class="field-group">
            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="name@example.com" required>
          </div>
          <div class="field-group">
            <label for="paymentMethod">Payment method</label>
            <select id="paymentMethod" required>
              <option value="card">Credit / Debit Card</option>
              <option value="upi">UPI</option>
              <option value="netbanking">Netbanking</option>
              <option value="wallet">Wallet</option>
            </select>
          </div>
          <div class="field-group">
            <label id="paymentDetailsLabel" for="paymentDetails">Card number</label>
            <input id="paymentDetails" type="text" placeholder="1234 5678 9012 3456" required>
          </div>
          <div class="field-row" id="expiryRow">
            <div class="field-group">
              <label for="expiry">Expiry date</label>
              <input id="expiry" type="text" placeholder="MM/YY" required>
            </div>
          </div>
          <div class="field-group location-group">
            <button id="locationBtn" class="btn secondary-btn" type="button">Use my location</button>
            <div id="locationOutput" class="location-output"></div>
          </div>
          <button id="payNowBtn" class="btn" type="submit">Pay Now</button>
        </form>
        <div id="paymentEmptyMsg" class="hidden"></div>
      </div>

      <div class="payment-summary-card">
        <h2>Order summary</h2>
        <ul id="paymentItems"></ul>
        <div class="summary-total">
          <span>Total</span>
          <span id="paymentTotal">₹0</span>
        </div>
        <p class="summary-note">All payments are securely processed. No real charge will be made in this demo.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
